        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 8px; }

        .glass-card:hover { border-color: rgba(34, 211, 238, 0.5); box-shadow: 0 0 20px rgba(34, 211, 238, 0.1); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        button:active { transform: scale(0.97); }

    // Notification helper
    function showNotification(message, type = 'info') {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `bg-gray-900/95 border-l-4 ${type === 'success' ? 'border-green-500' : type === 'error' ? 'border-red-500' : 'border-cyan-500'} rounded-r-lg shadow-2xl p-3 mb-2 animate-slide-in text-sm`;
        notif.innerHTML = `<div class="flex items-center gap-2"><span>${type === 'success' ? '✅' : type === 'error' ? '❌' : '🔔'}</span><span>${message}</span></div>`;
        container.appendChild(notif);
        setTimeout(() => notif.remove(), 4000);
    }

                from: locations[Math.floor(Math.random() * locations.length)],
                to: destinations[Math.floor(Math.random() * destinations.length)],
                amount: amounts[Math.floor(Math.random() * amounts.length)],
                currency: 'USD',
                timestamp: Date.now(),
                type: types[Math.floor(Math.random() * types.length)]
            };
            setState(s => ({
                liveTransactions: [newTx, ...s.liveTransactions].slice(0, 12),
                globalVolume: s.globalVolume + newTx.amount,
                totalTransactions: s.totalTransactions + 1
            }));

                showNotification(`💰 ${newTx.type.toUpperCase()}: $${newTx.amount.toLocaleString()} from ${newTx.from} to ${newTx.to}`, 'info');

        }, 2800);

            if (Math.random() > 0.75) {
                const threatTypes = ['SQL Injection', 'XSS Attack', 'API Abuse', 'Credential Stuffing', 'DDoS Amplification', 'Zero-Day Exploit', 'Supply Chain Attack'];

    function handleWithdraw() {
        if (state.withdrawAmount <= 0) {
            showNotification('Please enter a valid amount', 'error');
            return;
        }
        if (state.withdrawAmount > state.userWallet.available) {
            showNotification('Insufficient available balance', 'error');
            return;
        }
        setState({ withdrawStatus: 'processing', withdrawMessage: '' });
        setTimeout(() => {
            setState(s => ({
                userWallet: { 
                    ...s.userWallet, 
                    balance: s.userWallet.balance - s.withdrawAmount,
                    available: s.userWallet.available - s.withdrawAmount,
                    totalWithdrawn: s.userWallet.totalWithdrawn + s.withdrawAmount
                },
                withdrawStatus: 'success',
                withdrawMessage: `Successfully withdrew $${s.withdrawAmount.toLocaleString()} to ${s.selectedBank.name}`
            }));
            showNotification(`💸 Withdrawal of $${state.withdrawAmount.toLocaleString()} sent to ${state.selectedBank.name}`, 'success');
            setTimeout(() => setState({ withdrawStatus: 'idle', withdrawMessage: '' }), 4000);
        }, 2000);
    }

        if (state.isDeploying) return;
        setState({ isDeploying: true, deploymentLogs: [] });

            'Johannesburg Shard Grid (ZA_GP)',
            'Cape Town Edge Hub (ZA_WC)', 
            'Frankfurt Core Array (EU_CENTRAL)',

            'Tokyo Multi-Master Network (JP_EAST)',
            'São Paulo Gateway (BR_SOUTH)',
            'London Metro Node (UK_LON)',
            'Dubai Fiber Ring (AE_DXB)'
        ];
        locations.forEach((loc, idx) => {
            setTimeout(() => {
                setState(s => ({ deploymentLogs: [...s.deploymentLogs, `[✓] Propagated successfully into ${loc}`] }));
                if (idx === locations.length - 1) {
                    setTimeout(() => {
                        setState({ isDeploying: false });
                        showNotification('🚀 Global deployment complete! 8 regions updated.', 'success');
                    }, 500);
                }
            }, idx * 600);
        });
    }

        e.preventDefault();

            setState({ searchResults: null });
            return;
        }
        const query = state.searchQuery.toLowerCase();
        const results = {
            architectures: ARCHITECTURES.filter(a => a.name.toLowerCase().includes(query) || a.industry.toLowerCase().includes(query)),

            investors: Math.floor(Math.random() * 8) + 1,
            specialists: Math.floor(Math.random() * 15) + 3,
            deployments: Math.floor(Math.random() * 10) + 1

        setState({ searchResults: results });
        showNotification(`🔍 Found ${results.architectures.length} architectures matching "${state.searchQuery}"`, 'info');

                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="banknote" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">💸 LIVE ECONOMIC STREAM</h3></div>
                                <div class="h-64 overflow-y-auto space-y-2 pr-1">
                                    ${state.liveTransactions.map(tx => `
                                        <div class="bg-gray-800/40 border-l-4 border-cyan-500 p-2 rounded text-xs hover:bg-gray-800/60 transition">
                                            <div class="flex justify-between"><span class="text-cyan-300 font-mono">${tx.type.toUpperCase()}</span><span class="text-gray-400">${new Date(tx.timestamp).toLocaleTimeString()}</span></div>
                                            <div class="flex justify-between mt-1"><span>${tx.from} → ${tx.to}</span><span class="text-green-400 font-bold">$${tx.amount.toLocaleString()}</span></div>
                                        </div>
                                    `).join('') || '<div class="text-center text-gray-500 mt-8">🌊 Streaming economic activity...</div>'}
                                </div>
                            </div>

                            <!-- Creator Wallet -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="wallet" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">👛 CREATOR WALLET</h3></div>
                                <div class="text-center">
                                    <div class="text-3xl font-bold text-green-400">$${state.userWallet.balance.toLocaleString()}</div>
                                    <div class="flex justify-center gap-4 text-xs mt-1">
                                        <span>Available: $${state.userWallet.available.toLocaleString()}</span>
                                        <span>Pending: $${state.userWallet.pending.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-center gap-4 text-[10px] text-gray-500 mt-1">
                                        <span>Total Earned: $${state.userWallet.totalEarned.toLocaleString()}</span>
                                        <span>Withdrawn: $${state.userWallet.totalWithdrawn.toLocaleString()}</span>
                                    </div>
                                </div>
                                <div class="border-t border-gray-700 pt-3 mt-2">
                                    <label class="text-xs text-gray-400">Withdraw amount (USD)</label>
                                    <div class="flex gap-2 mt-1">
                                        <input type="number" id="withdrawAmountInput" value="${state.withdrawAmount}" class="bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm flex-1" placeholder="Amount">
                                        <button id="withdrawBtn" class="btn-primary px-4 py-2 rounded text-sm font-bold transition">${state.withdrawStatus === 'processing' ? '⏳ PROCESSING' : 'WITHDRAW'}</button>
                                    </div>
                                    ${state.withdrawMessage ? `<div class="text-${state.withdrawStatus === 'success' ? 'green' : 'red'}-400 text-xs mt-2 success-toast">${state.withdrawMessage}</div>` : ''}
                                </div>
                                <div class="mt-2 text-[10px] text-gray-500 text-center">💳 Supported: ACH • SEPA • SWIFT • Stablecoins</div>
                            </div>
                        </div>

                        <!-- MIDDLE COLUMN: Architecture & Deployment -->
                        <div class="space-y-6">
                            <!-- Knowledge Graph Search -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="search" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🔍 KNOWLEDGE GRAPH SEARCH</h3></div>
                                <form id="searchForm" class="flex gap-2">
                                    <input type="text" id="searchInput" value="${state.searchQuery}" placeholder="Search: fraud detection, quantum, healthcare..." class="flex-1 bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
                                    <button type="submit" class="btn-primary px-4 rounded text-sm">SEARCH</button>
                                </form>
                                ${state.searchResults ? `
                                    <div class="mt-3 text-xs space-y-1 bg-cyan-500/10 p-2 rounded">
                                        <div class="text-cyan-300">✓ Search results for "${state.searchQuery}":</div>
                                        <div>• ${state.searchResults.architectures.length} Architectures Found</div>
                                        <div>• ${state.searchResults.research} Research Artifacts</div>
                                        <div>• ${state.searchResults.investors} Capital Providers</div>
                                        <div>• ${state.searchResults.specialists} Mesh Specialists</div>
                                        <div>• ${state.searchResults.deployments} Active Deployments</div>
                                    </div>
                                ` : ''}
                            </div>

                            <!-- Architecture Stock Market -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="trending-up" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">📈 ARCHITECTURE STOCK MARKET</h3></div>
                                <div class="flex gap-2 overflow-x-auto pb-2">
                                    ${ARCHITECTURES.map(arch => `<button class="arch-select-btn px-3 py-1 rounded-full text-xs whitespace-nowrap transition-all ${state.selectedArch.id === arch.id ? 'bg-cyan-600 shadow-lg' : 'bg-gray-800 hover:bg-gray-700'}" data-arch-id="${arch.id}">${arch.name.split(' ')[0]} • ${arch.growth}%</button>`).join('')}
                                </div>
                                <div class="bg-gray-800/40 p-3 rounded-lg">
                                    <div class="flex justify-between items-start">
                                        <div><div class="text-xs text-gray-400">${state.selectedArch.id}</div><div class="text-lg font-bold">${state.selectedArch.name}</div><div class="text-xs text-cyan-400">${state.selectedArch.industry}</div></div>
                                        <div class="text-right"><div class="text-2xl font-bold text-green-400">$${(state.selectedArch.revenue/1e6).toFixed(1)}M</div><div class="text-xs text-green-300">+${state.selectedArch.growth}% Growth</div></div>
                                    </div>
                                    <div class="grid grid-cols-4 gap-2 mt-3 text-center text-xs">
                                        <div><span class="text-gray-400">Adoption</span><br><span class="text-white">${state.selectedArch.adoption}%</span></div>
                                        <div><span class="text-gray-400">Trust</span><br><span class="text-white">${state.selectedArch.trust}%</span></div>
                                        <div><span class="text-gray-400">Nodes</span><br><span class="text-white">${state.selectedArch.nodes}</span></div>
                                        <div><span class="text-gray-400">Health</span><br><span class="text-green-400">${state.selectedArch.health}</span></div>
                                    </div>
                                    <div class="mt-2 text-purple-300 text-xs border-t border-gray-700 pt-2 flex justify-between">
                                        <span>🎯 ${state.selectedArch.impact}</span>
                                        <button class="purchase-license-btn bg-purple-600/50 px-2 py-0.5 rounded text-[10px] hover:bg-purple-600 transition" data-arch-name="${state.selectedArch.name}">Buy License</button>
                                    </div>
                                </div>
                                <div class="mt-2 flex gap-2">
                                    <button class="investment-match-btn flex-1 bg-emerald-600/30 hover:bg-emerald-600/50 py-1 rounded text-xs transition" data-arch-name="${state.selectedArch.name}">🤝 Find Investors</button>
                                    <button id="simulateTwinBtn" class="flex-1 bg-cyan-600/30 hover:bg-cyan-600/50 py-1 rounded text-xs transition">🔄 Run Digital Twin</button>
                                </div>
                            </div>

                            <!-- Ignition Deployment Terminal -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="terminal" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🚀 IGNITION DEPLOYMENT TERMINAL</h3></div>
                                <button id="ignitionBtn" class="w-full btn-primary py-2.5 rounded font-bold flex justify-center gap-2 transition" ${state.isDeploying ? 'disabled' : ''}>
                                    ${state.isDeploying ? '<span class="animate-spin">⏳</span> DEPLOYING TO MESH...' : '⚡ EXECUTE INTERSTELLAR IGNITION'}
                                </button>
                                <div class="bg-black/70 p-2 rounded h-40 overflow-y-auto font-mono text-xs mt-3">
                                    ${state.deploymentLogs.map(log => `<div class="text-green-400">${log}</div>`).join('') || '<div class="text-gray-500">aetherion_core@mesh:~$ Ready for ignition</div>'}
                                    ${(!state.isDeploying && state.deploymentLogs.length > 0) ? '<div class="text-cyan-400 mt-1">✅ Deployment complete. Global mesh updated.</div>' : ''}
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT COLUMN: Security, Collaboration, Governance -->
                        <div class="space-y-6">
                            <!-- Security Operations Hub -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="shield" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🛡️ SECURITY OPERATIONS HUB</h3></div>
                                <div class="space-y-2 max-h-48 overflow-y-auto">
                                    ${state.activeThreats.map(t => `
                                        <div class="flex justify-between items-center bg-gray-800/20 p-2 rounded text-xs">
                                            <div class="flex gap-2"><span>${t.status === 'blocked' ? '✓' : '⚠'}</span><span>${t.type}</span><span class="text-gray-500">${t.location}</span></div>
                                            <div class="px-1 rounded ${getSeverityClass(t.severity)}">${t.severity}</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="text-center text-xs text-green-400 mt-2">🛡️ Void Guard Active — ${state.activeThreats.filter(t => t.status === 'blocked').length} threats neutralized in last hour</div>
                            </div>

                            <!-- Digital Twin Simulation -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="cpu" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🤖 DIGITAL TWIN SIMULATION</h3></div>
                                <div class="text-center space-y-2">
                                    <div class="flex justify-around text-xs">
                                        <div><span class="text-gray-400">Projected Users</span><br><span class="text-white text-lg">45M</span></div>
                                        <div><span class="text-gray-400">Monthly Cost</span><br><span class="text-white text-lg">$12.4k</span></div>
                                        <div><span class="text-gray-400">Failure Prob.</span><br><span class="text-green-400 text-lg">0.0003%</span></div>
                                    </div>
                                    <div class="h-12 bg-gray-800 rounded-full overflow-hidden">
                                        <div class="w-[99.997%] bg-gradient-to-r from-green-500 to-cyan-500 h-full rounded-full flex justify-end pr-2 text-xs items-center">HEALTHY</div>
                                    </div>
                                    <button id="simulateTwinBtn2" class="text-xs bg-gray-800 hover:bg-gray-700 px-4 py-1.5 rounded transition">🔄 RUN NEW SIMULATION</button>
                                    ${state.lastSimulation ? `<div class="text-[10px] text-gray-500 mt-1">Last: ${state.lastSimulation.substring(0, 50)}</div>` : '<div class="text-[10px] text-gray-500">Click to simulate architecture performance</div>'}
                                </div>
                            </div>

                            <!-- Collaboration & Governance -->
                            <div class="glass-card p-4">
                                <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="users" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🤝 COLLABORATION & GOVERNANCE</h3></div>
                                <div class="space-y-2 max-h-48 overflow-y-auto">
                                    ${LIVE_USERS.map(u => `
                                        <div class="flex justify-between items-center bg-gray-800/20 p-2 rounded">
                                            <div class="flex gap-2"><div class="w-2 h-2 bg-green-400 rounded-full animate-pulse mt-1.5"></div><div><div class="text-sm font-semibold">${u.name}</div><div class="text-[10px] text-gray-400">${u.role} • ${u.location}</div></div></div>
                                            <div class="flex gap-2"><span class="text-cyan-300 text-xs">Trust ${u.trustScore}</span><button class="collaborate-btn text-[10px] bg-purple-600/50 px-2 py-0.5 rounded hover:bg-purple-600 transition" data-user-name="${u.name}">Connect</button></div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="border-t border-gray-700 pt-2 mt-2">
                                    <div class="flex justify-between text-xs"><span>Active RFCs</span><span class="text-cyan-400">${state.activeProposals}</span></div>
                                    <div class="flex justify-between text-xs"><span>Pending Proposals</span><span class="text-yellow-400">${state.pendingProposals}</span></div>
                                    <div class="mt-2 text-[10px] text-gray-400">Innovation Pipeline</div>
                                    <div class="space-y-1 mt-1">
                                        ${state.innovationPipeline.map(item => `
                                            <div><div class="flex justify-between text-[10px]"><span>${item.name}</span><span class="${getStageColor(item.stage)} px-1 rounded">${item.stage}</span></div><div class="h-1 bg-gray-700 rounded-full overflow-hidden"><div class="${getStageColor(item.stage)} h-full rounded-full" style="width: ${item.progress}%"></div></div></div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- BOTTOM: Planetary Topology & Mission Timeline -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                        <div class="lg:col-span-2 glass-card p-4">
                            <div class="flex gap-2 items-center border-b border-gray-700 pb-2 mb-3"><i data-lucide="globe" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🌌 PLANETARY TOPOLOGY VIEW</h3></div>
                            <div class="relative bg-black/40 rounded-lg h-52 flex justify-center items-center overflow-hidden">
                                <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_#06b6d410,_transparent)]"></div>
                                <div class="relative flex flex-wrap justify-center gap-6 md:gap-10">
                                    ${['Johannesburg', 'Cape Town', 'London', 'Frankfurt', 'Singapore', 'Tokyo', 'São Paulo', 'Dubai'].map((city, i) => `
                                        <div class="text-center animate-float" style="animation-delay: ${i * 0.15}s">
                                            <div class="w-3 h-3 bg-cyan-400 rounded-full mx-auto shadow-lg shadow-cyan-500/40"></div>
                                            <div class="text-[10px] mt-1">${city}</div>
                                            <div class="text-[8px] text-green-400">● active</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="absolute bottom-2 left-2 text-[9px] text-gray-500">💰 Revenue flows • ${state.activeNodes.toLocaleString()} active nodes • 99.999% uptime</div>
                            </div>
                        </div>
                        <div class="glass-card p-4">
                            <div class="flex gap-2 items-center border-b border-gray-700 pb-2 mb-3"><i data-lucide="clock" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">🕒 MISSION CONTROL TIMELINE</h3></div>
                            <div class="h-48 overflow-y-auto space-y-1 text-xs font-mono">
                                <div class="text-green-400">10:42:01 Investor funded Healthcare Mesh — $5.2M</div>
                                <div class="text-cyan-400">10:42:05 License sold in Germany — $12,400</div>
                                <div class="text-red-400">10:42:07 Threat blocked in Virginia</div>
                                <div class="text-green-400">10:42:10 Deployment completed in Tokyo</div>
                                <div class="text-yellow-400">10:42:13 Royalty paid to @mandlenkosi — $8,400</div>
                                <div class="text-purple-400">10:42:18 New Architecture: Quantum ML Core</div>
                                <div class="text-gray-500">10:42:22 Governance vote opened: RFC-42</div>
                                <div class="text-cyan-400">10:42:28 Capitec Bank settlement completed</div>
                                <div class="text-green-400">10:42:35 AI match found for ARCH-FIN-SETTLE-88</div>
                            </div>
                        </div>
                    </div>

                    <!-- Investment Opportunities -->
                    <div class="glass-card p-4 mt-6">
                        <div class="flex items-center gap-2 border-b border-gray-700 pb-2 mb-3"><i data-lucide="trending-up" class="w-4 h-4 text-cyan-400"></i><h3 class="font-semibold text-sm">💼 AI INVESTMENT MATCHMAKER</h3></div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            ${state.investmentMatches.map(m => `
                                <div class="bg-gray-800/30 p-3 rounded-lg">
                                    <div class="font-semibold">${m.investor}</div>
                                    <div class="text-xs text-gray-400">Confidence: ${m.confidence}%</div>
                                    <div class="text-lg font-bold text-green-400">$${(m.amount / 1000000).toFixed(1)}M</div>
                                    <div class="text-xs">Sector: ${m.sector}</div>
                                    <button class="investment-deal-btn w-full mt-2 bg-cyan-600/50 hover:bg-cyan-600 py-1 rounded text-xs transition" data-investor="${m.investor}">Propose Deal</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="mt-8 text-center text-[11px] text-gray-500 border-t border-gray-800 pt-4">
                        <div class="flex flex-wrap justify-center gap-4">
                            <span>🌍 Planetary Digital Economy</span>
                            <span>⚡ $${state.globalVolume.toLocaleString()} Total Volume</span>
                            <span>🔒 SOC Type-2 Certified</span>
                            <span>🏦 Connected to ${GLOBAL_BANKS.length} Global Banks</span>
                            <span>📡 ${state.activeNodes.toLocaleString()} Active Nodes</span>
                        </div>
                        <div class="mt-2">© Aetherion MeshHub — Solving Real World Problems: Fraud Prevention, Healthcare Access, Energy Optimization, Agricultural Yield, AI Inference</div>
                    </div>
                </div>
            </div>
        `;

        root.innerHTML = html;
        if (typeof lucide !== 'undefined') lucide.createIcons();
        attachEventHandlers();
    }

    function attachEventHandlers() {
        // Bank selection
        document.querySelectorAll('.bank-select-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const bankName = btn.getAttribute('data-bank-name');
                handleSelectBank(bankName);
                render();
            });
        });

        // Withdraw
        const withdrawInput = document.getElementById('withdrawAmountInput');
        if (withdrawInput) withdrawInput.addEventListener('input', (e) => setState({ withdrawAmount: parseInt(e.target.value) || 0 }));
        const withdrawBtn = document.getElementById('withdrawBtn');
        if (withdrawBtn) withdrawBtn.addEventListener('click', () => { handleWithdraw(); render(); });

        // Ignition
        const ignitionBtn = document.getElementById('ignitionBtn');
        if (ignitionBtn) ignitionBtn.addEventListener('click', () => { handleIgnitionDeploy(); render(); });

        // Architecture selection
        document.querySelectorAll('.arch-select-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const archId = btn.getAttribute('data-arch-id');
                handleSelectArch(archId);
                render();
            });
        });

        // Purchase license
        document.querySelectorAll('.purchase-license-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const archName = btn.getAttribute('data-arch-name');
                handlePurchaseLicense(archName);
                render();
            });
        });

        // Investment match
        document.querySelectorAll('.investment-match-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const archName = btn.getAttribute('data-arch-name');
                handleInvestmentMatch(archName);
                render();
            });
        });

        // Investment deal proposal
        document.querySelectorAll('.investment-deal-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const investor = btn.getAttribute('data-investor');
                showNotification(`📈 Deal proposal sent to ${investor}. They will respond within 24 hours.`, 'success');
            });
        });

        // Collaborate
        document.querySelectorAll('.collaborate-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const userName = btn.getAttribute('data-user-name');
                handleCollaborate(userName);
                render();
            });
        });

        // Simulate Twin buttons
        const simBtns = document.querySelectorAll('#simulateTwinBtn, #simulateTwinBtn2');
        simBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                handleSimulateTwin();
                render();
            });
        });

        // Search
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        if (searchForm) searchForm.addEventListener('submit', (e) => { handleSearch(e); render(); });
        if (searchInput) searchInput.addEventListener('input', (e) => setState({ searchQuery: e.target.value }));
    }

    // Initialize
    startLiveStreams();
    subscribe(render);
    render();
</script>
</body>
</html>
